<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>游戏名称 - 学习游戏中心</title>

  <!-- ① 引入共享样式（必须在游戏专属样式之前） -->
  <link rel="stylesheet" href="../shared.css">

  <style>
    /* ② 覆盖主题色（必填，每个游戏一套颜色） */
    :root {
      --accent:     #7c83ff;               /* 主题色 */
      --accent-dim: rgba(124,131,255,0.25); /* 主题色半透明，用于阴影/发光 */
    }

    /* ③ 游戏专属样式写这里
       只写这个游戏独有的 UI，shared.css 已覆盖：
       body / .game-topbar / .screen / .btn / .card /
       .game-intro / .level-complete / .complete-screen / 动画
    */

    /* 示例：交互元素 */
    .option-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }
    .option-item {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--r-md);
      padding: 16px 20px;
      font-size: 15px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .option-item:hover {
      border-color: var(--accent);
      color: var(--text);
      transform: translateY(-2px);
    }
    .option-item.selected {
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 10%, var(--surface));
      color: var(--accent);
      font-weight: 600;
    }

    /* ④ 反馈卡片（每关提交后显示，必须标准化） */
    .feedback-card {
      border-radius: var(--r-md);
      padding: 16px 20px;
      display: none;                /* 提交前隐藏，JS 改为 block */
      animation: fadeIn 0.3s ease;
    }
    .feedback-card.correct {
      background: color-mix(in srgb, #10b981 12%, var(--surface));
      border: 2px solid #10b981;
    }
    .feedback-card.wrong {
      background: color-mix(in srgb, #ef4444 12%, var(--surface));
      border: 2px solid #ef4444;
    }
    .feedback-card__verdict {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .feedback-card.correct .feedback-card__verdict { color: #10b981; }
    .feedback-card.wrong   .feedback-card__verdict { color: #ef4444; }
    .feedback-card__explain {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 14px;
    }
  </style>
</head>
<body>

<!-- ④ Topbar（固定结构）
     只改：标题文字、dot 数量（和关卡数保持一致）
-->
<nav class="game-topbar">
  <a class="game-topbar__back" href="/study_game/">← 返回</a>
  <h1 class="game-topbar__title">游戏名称</h1>
  <div class="game-topbar__progress">
    <!-- 每关一个 dot，3 关就写 3 个 -->
    <div class="game-topbar__dot"></div>
    <div class="game-topbar__dot"></div>
    <div class="game-topbar__dot"></div>
  </div>
</nav>


<!-- ⑤ Intro 屏（固定布局，改内容） -->
<div class="screen active" id="screen-intro">
  <div class="game-intro fade-in">
    <span class="game-intro__icon">🎯</span>
    <h1 class="game-intro__title">游戏标题</h1>
    <p class="game-intro__desc">
      一两句话说清楚这个游戏的核心体验。<br>
      让玩家知道他将亲手做什么、能学到什么。
    </p>
    <div class="game-intro__meta">
      <div>⏱ <span>约 N 分钟</span></div>
      <div>🎯 <span>N 关</span></div>
      <div>✦ <span>核心标签</span></div>
    </div>
    <button class="btn btn-primary" onclick="startGame()">开始 →</button>
  </div>
</div>


<!-- ⑥ 关卡屏模板（每关复制一份，改 id 和内容） -->

<!-- 第 1 关 -->
<div class="screen" id="screen-level-1">
  <div class="fade-in" style="width:100%; max-width:520px; display:flex; flex-direction:column; gap:20px;">

    <!-- 关卡说明卡片 -->
    <div class="card">
      <div style="font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px;">第 1 关</div>
      <h2 style="font-size:20px; color:var(--accent); margin-bottom:8px;">关卡标题</h2>
      <p style="color:var(--text-muted); font-size:14px; line-height:1.8;">
        关卡介绍或情景说明文字。
      </p>
    </div>

    <!-- 主交互区域（游戏 UI 写这里） -->
    <div class="card">
      <p style="color:var(--text-muted); margin-bottom:16px;">问题或操作指令</p>

      <!-- 示例：选项列表 -->
      <div class="option-list" id="level1Options">
        <div class="option-item" onclick="selectOption(this, 1, 'A')">选项 A</div>
        <div class="option-item" onclick="selectOption(this, 1, 'B')">选项 B</div>
        <div class="option-item" onclick="selectOption(this, 1, 'C')">选项 C</div>
      </div>
    </div>

    <!-- 提交按钮（选完选项后显示） -->
    <div style="text-align:center; display:none;" id="level1Submit">
      <button class="btn btn-primary" onclick="submitLevel1()">提交判断</button>
    </div>

    <!-- 反馈卡片（提交后显示，答对用 correct，答错用 wrong） -->
    <div class="feedback-card" id="level1Feedback">
      <div class="feedback-card__verdict" id="level1Verdict"></div>
      <p class="feedback-card__explain" id="level1Explain"></p>
      <div style="text-align:center;">
        <button class="btn btn-primary" onclick="completeLevel(1)">继续 →</button>
      </div>
    </div>

  </div>
</div>


<!-- 第 2 关 -->
<div class="screen" id="screen-level-2">
  <div class="fade-in" style="width:100%; max-width:520px; display:flex; flex-direction:column; gap:20px;">
    <div class="card">
      <div style="font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px;">第 2 关</div>
      <h2 style="font-size:20px; color:var(--accent); margin-bottom:8px;">关卡标题</h2>
      <p style="color:var(--text-muted); font-size:14px; line-height:1.8;">关卡说明。</p>
    </div>
    <div class="card">
      <!-- 游戏内容 -->
      <button class="btn btn-primary" onclick="completeLevel(2)">继续 →</button>
    </div>
  </div>
</div>


<!-- 第 3 关 -->
<div class="screen" id="screen-level-3">
  <div class="fade-in" style="width:100%; max-width:520px; display:flex; flex-direction:column; gap:20px;">
    <div class="card">
      <div style="font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px;">第 3 关</div>
      <h2 style="font-size:20px; color:var(--accent); margin-bottom:8px;">关卡标题</h2>
      <p style="color:var(--text-muted); font-size:14px; line-height:1.8;">关卡说明。</p>
    </div>
    <div class="card">
      <!-- 游戏内容 -->
      <button class="btn btn-primary" onclick="completeLevel(3)">完成 →</button>
    </div>
  </div>
</div>


<!-- ⑦-A 失败屏（固定结构，无需改内容） -->
<div class="screen" id="screen-failed">
  <div class="failed-screen">
    <div class="failed-screen__rings">
      <div class="failed-screen__ring"></div>
      <div class="failed-screen__ring"></div>
      <div class="failed-screen__ring"></div>
      <div class="failed-screen__ring"></div>
    </div>
    <div class="failed-screen__content fade-in-slow">
      <div class="failed-screen__icon">💥</div>
      <div class="failed-screen__title">挑战失败</div>
      <p class="failed-screen__desc" id="failed-desc"></p>
      <div class="failed-screen__actions">
        <button class="btn btn-danger" onclick="resetGame()">重新挑战</button>
        <a class="btn btn-ghost" href="/study_game/">返回游戏中心</a>
      </div>
    </div>
  </div>
</div>

<!-- ⑦-B 通关屏（固定结构，改标题/描述） -->
<div class="screen" id="screen-complete">
  <div class="complete-screen">
    <div class="complete-screen__rings">
      <div class="complete-screen__ring"></div>
      <div class="complete-screen__ring"></div>
      <div class="complete-screen__ring"></div>
      <div class="complete-screen__ring"></div>
    </div>
    <div class="complete-screen__content fade-in-slow">
      <div class="complete-screen__title">通关！</div>
      <p class="complete-screen__desc">
        总结一句话：玩家在这个游戏里掌握了什么。
      </p>
      <div class="complete-screen__actions">
        <button class="btn btn-primary" onclick="resetGame()">再玩一次</button>
        <a class="btn btn-ghost" href="/study_game/">返回游戏中心</a>
      </div>
    </div>
  </div>
</div>


<!-- ⑧ 引入共享工具 + 游戏逻辑 -->
<script src="../game-utils.js"></script>
<script>

/* =====================================================
   游戏状态
   按需扩展，保持 totalLevels 和 topbar dot 数量一致
===================================================== */
const G = {
  totalLevels: 3,
  // 游戏专属状态...
};


/* =====================================================
   标准关卡流程（通常不需要改）
===================================================== */

function startGame() {
  Mistakes.reset();
  showScreen('level-1');
  TopbarProgress.update({ activeIndex: 0 });
}

function completeLevel(n) {
  const done = n;
  const next = n + 1;
  TopbarProgress.update({ doneUpTo: done, activeIndex: next <= G.totalLevels ? next - 1 : -1 });

  if (n < G.totalLevels) {
    showScreen('level-' + next);
  } else {
    TopbarProgress.completeAll();
    if (Mistakes.get() > 0) {
      document.getElementById('failed-desc').textContent =
        `本次有 ${Mistakes.get()} 关答错了，知识点还需要加强，再来一次！`;
      showScreen('failed');
    } else {
      showScreen('complete');
    }
  }
}

function resetGame() {
  TopbarProgress.reset();
  Mistakes.reset();
  // 重置游戏状态...
  showScreen('intro');
}


/* =====================================================
   关卡逻辑（每关写一个函数块）
===================================================== */

// ----- 第 1 关 -----

/* 正确答案配置（实现时替换） */
const ANSWERS = {
  level1: 'A',  // ← 改为本关正确答案
};

function selectOption(el, level, choice) {
  el.closest('.option-list').querySelectorAll('.option-item').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  G['level' + level + 'Choice'] = choice;
  document.getElementById('level' + level + 'Submit').style.display = 'block';
}

function submitLevel1() {
  const choice  = G.level1Choice;
  const correct = choice === ANSWERS.level1;
  if (!correct) Mistakes.add();
  const fb      = document.getElementById('level1Feedback');
  fb.className  = 'feedback-card ' + (correct ? 'correct' : 'wrong');

  document.getElementById('level1Verdict').textContent  = correct ? '✓ 正确！' : '✗ 答错了';
  document.getElementById('level1Explain').textContent  =
    correct
      ? '正确原因：……（填写解释）'
      : '正确答案是 X，因为……（填写教学解释）';

  document.getElementById('level1Submit').style.display = 'none';
  fb.style.display = 'block';
}

// ----- 提交函数模板（第 2、3 关复制此结构）-----
// function submitLevel2() { ... }

// ----- 第 2 关 -----
// function level2_xxx() { ... }

// ----- 第 3 关 -----
// function level3_xxx() { ... }

</script>
</body>
</html>
